# G2 领导人互访数据库 · 每日自动更新
# 数据流: 国务院历史办 + 维基百科 + 外交部 zyxw -> pipeline/out/*.csv -> 直接 commit 回 master
#        -> 下游 global-pulse 的 daily-data workflow (00:30 UTC) 克隆本仓构建 g2_visits.json 图层
# 触发: 每日 23:45 UTC (北京 07:45, 早于 global-pulse 08:30) + 手动 workflow_dispatch
# 沿革: 原为每月 1 日跑批, 2026-07 并入 global-pulse 每日数据流后改为每日 (增量窗口自适应, 每日跑量很小)
name: daily-update  # G2 数据流

on:
  schedule:
    - cron: '45 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run monthly pipeline
        run: bash pipeline/run_monthly.sh

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 白名单式提交: 只收数据产物, 不收抓取缓存/嵌套克隆仓 (travels/visits gitlink 事故教训)
          git add inbound_cn_master.csv 'pipeline/out/*.csv' 'pipeline/out/validation_*.txt'
          if git diff --cached --quiet; then
            echo "无数据变更, 跳过提交"
          else
            git commit -m "data: monthly update $(date -u +%Y-%m) [skip ci]"
            git push
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-${{ github.run_number }}
          path: pipeline/out/validation_*.txt
          if-no-files-found: ignore
          retention-days: 90
